<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Feature Cards</title>
</head>
<body>
    <div class="wrapper">
        <main>
            <section class="container" aria-labelledby="cards-heading">
                <h2 id="cards-heading" class="visually-hidden">501 in numbers</h2>

                <div class="cards">
                    <article class="card theme-green" aria-label="More than £12,000,000 delighted guests">
                        <div class="card-content">
                            <p>More than</p>
                            <h3 class="hero">£12,000,000</h3>
                            <p>delighted guests</p>
                        </div>
                        <div class="card-icon" data-icon="hands" aria-hidden="true"></div>
                    </article>

                    <article class="card theme-pink" aria-label="Find us in 50 countries">
                        <div class="card-content">
                            <p>Find us in</p>
                            <h3 class="hero">50</h3>
                            <p>countries</p>
                        </div>
                        <div class="card-icon" data-icon="globe" aria-hidden="true"></div>
                    </article>

                    <article class="card theme-blue" aria-label="Over 800,000,000 darts thrown">
                        <div class="card-content">
                            <p>Over</p>
                            <h3 class="hero">800,000,000</h3>
                            <p>darts thrown</p>
                        </div>
                        <div class="card-icon" data-icon="dart" aria-hidden="true"></div>
                    </article>
                </div>
            </section>
        </main>
    </div>
    <script src="js/cards.js"></script>
</body>
</html>
