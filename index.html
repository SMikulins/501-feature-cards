<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Feature Cards</title>
</head>
<body>
    <div class="wrapper">
        <main>
            <section class="container" aria-label="501 in numbers">
                <div class="cards">
                    <article class="card theme-green">
                        <div class="card-content">
                            <p>More than</p>
                            <h2 class="hero">£12,000,000</h2>
                            <p>delighted guests</p>
                        </div>
                        <div class="card-icon" data-icon="hands" aria-hidden="true"></div>
                    </article>

                    <article class="card theme-pink">
                        <div class="card-content">
                            <p>Find us in</p>
                            <h2 class="hero">50</h2>
                            <p>countries</p>
                        </div>
                        <div class="card-icon" data-icon="globe" aria-hidden="true"></div>
                    </article>

                    <article class="card theme-blue">
                        <div class="card-content">
                            <p>Over</p>
                            <h2 class="hero">800,000,000</h2>
                            <p>darts thrown</p>
                        </div>
                        <div class="card-icon" data-icon="dart" aria-hidden="true"></div>
                    </article>
                </div>
            </section>
        </main>
    </div>
    <script src="js/cards.js"></script>
</body>
</html>
